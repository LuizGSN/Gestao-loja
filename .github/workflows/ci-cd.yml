name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install pytest pytest-asyncio httpx
      - run: pytest tests/test_validators.py tests/test_utils.py -v
