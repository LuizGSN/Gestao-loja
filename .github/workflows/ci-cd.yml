name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job de Testes
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: loja
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Cache de dependências
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 📦 Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🧪 Rodar testes com coverage
      env:
        DB_HOST: localhost
        DB_USER: root
        DB_PASSWORD: testpassword
        DB_DATABASE: loja
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

    - name: 📊 Enviar coverage para Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: 🎨 Verificar formatação do código
      run: |
        pip install black
        black --check . || true

  # Job de Build Docker
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v4

    - name: 🐳 Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🏗️ Build da imagem Docker
      run: |
        docker build -t gestao-loja-api:${{ github.sha }} .
        docker tag gestao-loja-api:${{ github.sha }} gestao-loja-api:latest

    - name: ✅ Testar imagem Docker
      run: |
        docker run --rm gestao-loja-api:latest --help || true

